name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: the-orrery/.github/.github/workflows/python-ci.yml@v7
    with:
      ruff-extend-ignore: "['TRY003','TRY300']"
      ruff-extend-per-file-ignores: "{'src/pharos/alerts/store.py'=['PLR0913'],'src/pharos/checks/contrib.py'=['PLR0911'],'src/pharos/checks/types.py'=['PLR0913','C901','PLR0912'],'src/pharos/cli.py'=['C901','PLR0912','PLR0915'],'src/pharos/telemetry.py'=['PLR0913'],'tests/**'=['ARG','PLR0913']}"
